# Sentinel Plugin Configuration
lynx:
  sentinel:
    # 运行时默认会回退到当前 Lynx 应用名，再回退到 lynx-app
    app_name: "lynx-app"

    # log_level 当前仍遵循全局日志配置，这里保留为兼容字段
    log_dir: "./logs/sentinel"
    log_level: "info"

    flow_rules:
      - resource: "default"
        token_calculate_strategy: 0   # flow.Direct
        control_behavior: 0           # flow.Reject
        threshold: 100
        stat_interval_in_ms: 1000
        warm_up_period_sec: 0
        max_queueing_time_ms: 0

    circuit_breaker_rules:
      - resource: "default"
        strategy: 1                   # circuitbreaker.ErrorRatio
        threshold: 0.5
        retry_timeout_ms: 5000
        min_request_amount: 10
        stat_interval_ms: 1000

    system_rules:
      - metric_type: 0                # system.Load
        trigger_count: 2.0
        strategy: 0

    metrics:
      enabled: true
      interval: "30s"

    dashboard:
      enabled: false
      port: 8719

    # 兼容保留字段：当前结构体会接收，但启动和规则装载路径尚未消费
    data_source:
      type: ""
      file:
        flow_rules_path: ""
        circuit_breaker_rules_path: ""
        system_rules_path: ""

    warm_up:
      enabled: false
      duration: ""

    advanced:
      stat_interval_ms: 0
      metric_log_flush_interval_sec: 0

    # 顶层 enabled 也是兼容字段，当前模块不会据此短路初始化
    # enabled: true
